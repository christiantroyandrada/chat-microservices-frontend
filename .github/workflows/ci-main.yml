name: CI Pipeline [master]

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/chat-frontend

jobs:
  build-and-test:
    name: Build, Test & Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        # Pinned to specific commit SHA for supply-chain security
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        # Pinned to specific commit SHA for supply-chain security
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: '9.11.0'

      - name: Setup Node.js
        # Pinned to specific commit SHA for supply-chain security
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          # Cache the pnpm store — avoids re-downloading packages on every run.
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Audit dependencies
        run: pnpm audit --audit-level=moderate || true

      - name: Lint
        run: pnpm run lint

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Svelte check
        run: pnpm run check

      - name: Build
        run: |
          pnpm run prepare || true
          pnpm run build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run unit tests
        run: pnpm run coverage:unit
        timeout-minutes: 15

      - name: Upload coverage artifact
        # Share coverage/lcov.info with the sonar job to avoid re-running tests there.
        # Pinned to specific commit SHA for supply-chain security
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend-coverage
          path: coverage/lcov.info
          retention-days: 1
          if-no-files-found: warn

  sonar:
    name: SonarCloud Scan
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        # Pinned to specific commit SHA for supply-chain security
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download coverage artifact
        # Use the lcov.info produced by build-and-test — no need to reinstall
        # deps, playwright, or re-run tests here. Saves ~6 min per main push.
        # Pinned to specific commit SHA for supply-chain security
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-coverage
          path: coverage/

      - name: SonarCloud Scan
        # Pinned to specific commit SHA for supply-chain security
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.exclusions=tests/**,test/**,__mocks__/**,mocks/**
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Build and push Docker image to GHCR
  docker-build:
    name: Build & Push Docker Image
    needs: build-and-test
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        # Pinned to specific commit SHA for supply-chain security
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        # Pinned to specific commit SHA for supply-chain security
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        # Pinned to specific commit SHA for supply-chain security
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch secrets from Infisical
        # Pinned to specific commit SHA for supply-chain security
        uses: Infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995 # v1.0.16
        with:
          method: universal
          client-id: ${{ secrets.INFISCAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISCAL_CLIENT_SECRET }}
          project-slug: ${{ secrets.INFISCAL_PROJECT_SLUG }}
          env-slug: prod
          secret-path: /

      - name: Build and push frontend
        # Pinned to specific commit SHA for supply-chain security
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/chat-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/chat-frontend:latest
          build-args: |
            BUILD_ENV=production
            PUBLIC_API_URL=https://chat.ctaprojects.xyz
            PUBLIC_WS_URL=https://chat.ctaprojects.xyz
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to VPS - Blue-Green style deployment with health verification
  deploy:
    name: Deploy Frontend to VPS
    needs: docker-build
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 35
    concurrency:
      group: production-frontend-deployment
      cancel-in-progress: false

    steps:
      - name: Deploy Frontend via SSH (Blue-Green)
        # Pinned to specific commit SHA for supply-chain security
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          VPS_SUDO_PASSWORD: ${{ secrets.VPS_SUDO_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAG: ${{ github.sha }}
          REPO_OWNER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 20m
          envs: VPS_SUDO_PASSWORD,GITHUB_TOKEN,IMAGE_TAG,REPO_OWNER
          script: |
            set -euo pipefail
            DEPLOY_PATH="/opt/chat-app/chat-microservices"

            # Mask sensitive env vars from logs
            echo "::add-mask::$VPS_SUDO_PASSWORD"
            echo "::add-mask::$GITHUB_TOKEN"

            echo "🚀 Starting frontend deployment (Blue-Green strategy)..."

            # Check if backend has been deployed first
            if [ ! -f "$DEPLOY_PATH/docker-compose.yml" ]; then
              echo "❌ Backend not deployed yet. Please deploy backend first."
              exit 1
            fi

            cd "$DEPLOY_PATH"

            # Log in to GHCR (token passed via stdin, not echoed)
            echo "🔐 Logging in to GHCR..."
            docker login ghcr.io -u "$REPO_OWNER" --password-stdin <<< "$GITHUB_TOKEN" 2>/dev/null

            # Store current image tag for rollback
            CURRENT_TAG=$(grep -oP "chat-frontend:\K[^\s\"']+" docker-compose.yml 2>/dev/null || echo "latest")
            echo "📌 Current frontend tag: $CURRENT_TAG"
            echo "📌 New frontend tag: $IMAGE_TAG"

            # Update frontend image tag and add runtime env vars
            echo "📝 Updating frontend configuration..."
            sed -i "s|ghcr.io/${REPO_OWNER}/chat-frontend:[^[:space:]\"']*|ghcr.io/${REPO_OWNER}/chat-frontend:${IMAGE_TAG}|g" docker-compose.yml

            # Ensure runtime PUBLIC_API_URL and PUBLIC_WS_URL are set
            if ! grep -q "PUBLIC_API_URL:" docker-compose.yml; then
              echo "⚠️ Adding missing PUBLIC_API_URL to frontend environment"
            fi

            echo "🐳 Pre-pulling new frontend image..."
            docker pull "ghcr.io/${REPO_OWNER}/chat-frontend:${IMAGE_TAG}"

            # Verify the new image exists and is valid
            if ! docker image inspect "ghcr.io/${REPO_OWNER}/chat-frontend:${IMAGE_TAG}" >/dev/null 2>&1; then
              echo "❌ Failed to pull new image, aborting deployment"
              exit 1
            fi
            echo "✅ New image pulled and verified"

            # Point :latest at the freshly pulled image. The compose frontend
            # service references :latest (and the backend regenerates the compose
            # with :latest on every deploy), so retagging here makes the recreate
            # deterministically land on the new build regardless of the tag-rewrite
            # sed above or which pipeline deployed last.
            docker tag "ghcr.io/${REPO_OWNER}/chat-frontend:${IMAGE_TAG}" "ghcr.io/${REPO_OWNER}/chat-frontend:latest"

            # Recreate the frontend container with the new image. A real
            # blue-green swap isn't possible for a single named compose service,
            # and the previous --no-recreate step left the OLD container running
            # (compose reported "Running" and never applied the new tag). Force
            # the recreate so the freshly pulled image is actually deployed; the
            # container's own healthcheck + restart policy keep downtime to seconds.
            echo "🔵 Recreating frontend container with new image..."
            docker compose up -d --no-deps --force-recreate frontend

            echo "⏳ Waiting for new container to be healthy (max 60s)..."
            HEALTH_TIMEOUT=60
            HEALTH_CHECK=0
            while [ $HEALTH_CHECK -lt $HEALTH_TIMEOUT ]; do
              # Check if container is running and responding
              CONTAINER_STATUS=$(docker compose ps frontend --format json 2>/dev/null | head -1)
              if echo "$CONTAINER_STATUS" | grep -q '"State":"running"'; then
                # Test internal health endpoint
                FRONTEND_IP=$(docker compose exec -T frontend hostname -i 2>/dev/null || echo "")
                if [ -n "$FRONTEND_IP" ]; then
                  if docker compose exec -T nginx wget -q --spider --timeout=2 "http://frontend:3000/" 2>/dev/null || \
                     docker compose exec -T nginx timeout 2 bash -c "</dev/tcp/frontend/3000" 2>/dev/null; then
                    echo "✅ New frontend container is healthy!"
                    break
                  fi
                fi
              fi
              sleep 2
              HEALTH_CHECK=$((HEALTH_CHECK + 2))
              echo "   Waiting... ${HEALTH_CHECK}s"
            done

            if [ $HEALTH_CHECK -ge $HEALTH_TIMEOUT ]; then
              echo "⚠️ Health check timeout, but proceeding (container may still be starting)..."
            fi

            # Reload nginx to pick up any DNS changes (no restart needed)
            echo "🔄 Reloading nginx configuration..."
            docker compose exec -T nginx nginx -s reload 2>/dev/null || docker compose restart nginx || true

            sleep 5

            # Final verification via public endpoint
            echo "🔍 Verifying deployment via public endpoint..."
            if curl -fsS --max-time 10 http://localhost:80/ >/dev/null 2>&1; then
              echo "✅ Frontend deployment successful!"
              echo "🧹 Cleaning up old images..."
              docker image prune -f --filter "until=24h" || true
            else
              echo "⚠️ Public endpoint check failed, checking container status..."
              docker compose ps frontend
              docker compose logs frontend --tail=50
              
              # Attempt rollback if we have a previous working tag
              if [ "$CURRENT_TAG" != "$IMAGE_TAG" ] && [ "$CURRENT_TAG" != "latest" ]; then
                echo "🔙 Attempting rollback to $CURRENT_TAG..."
                sed -i "s|ghcr.io/${REPO_OWNER}/chat-frontend:${IMAGE_TAG}|ghcr.io/${REPO_OWNER}/chat-frontend:${CURRENT_TAG}|g" docker-compose.yml
                docker compose up -d --no-deps frontend
                echo "⚠️ Rolled back to previous version"
                exit 1
              fi
            fi

            docker compose ps

      - name: Security cleanup
        if: always()
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          VPS_SUDO_PASSWORD: ${{ secrets.VPS_SUDO_PASSWORD }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: VPS_SUDO_PASSWORD
          script: |
            echo "🔒 Security cleanup..."
            DEPLOY_PATH="/opt/chat-app"

            # Mask sudo password
            echo "::add-mask::$VPS_SUDO_PASSWORD"

            # Remove any frontend source files if they exist
            rm -rf "$DEPLOY_PATH/chat-microservices-frontend" 2>/dev/null || true

            cd "$DEPLOY_PATH/chat-microservices" 2>/dev/null || exit 0

            # Remove git data
            rm -rf .git .github 2>/dev/null || true

            # Prune Docker
            docker image prune -f || true
            docker container prune -f || true

            echo "✅ Security cleanup complete!"

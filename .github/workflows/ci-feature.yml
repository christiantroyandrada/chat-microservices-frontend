name: ci

on:
  push:
    # Run CI on all branches except the default/main branch (feature branches)
    branches-ignore: [main, master]
  pull_request: # run for PRs (pre-merge checks)

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout
        # Pinned to specific commit SHA for supply-chain security
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        # Pinned to specific commit SHA for supply-chain security
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: '9.11.0'

      - name: Use Node.js ${{ matrix.node-version }}
        # Pinned to specific commit SHA for supply-chain security
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Lint (Prettier + ESLint)
        run: pnpm run lint

      - name: TypeScript type check
        run: pnpm exec tsc --noEmit

      - name: Svelte check
        run: pnpm run check

      - name: Build FE
        run: |
          pnpm run prepare && pnpm run build

      - name: Audit repo
        run: |
          pnpm audit --audit-level=moderate || true

      - name: Summary
        run: echo "Frontend CI completed successfully"

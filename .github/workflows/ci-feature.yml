name: ci

on:
  push:
    # Run CI on all branches except the default/main branch (feature branches)
    branches-ignore: [main, master]
  pull_request: # run for PRs (pre-merge checks)

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout
        # Pinned to specific commit SHA for supply-chain security
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        # Pinned to specific commit SHA for supply-chain security
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: '9.11.0'

      - name: Use Node.js ${{ matrix.node-version }}
        # Pinned to specific commit SHA for supply-chain security
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Lint (Prettier + ESLint)
        run: pnpm run lint

      - name: TypeScript type check
        run: pnpm exec tsc --noEmit

      - name: Svelte check
        run: pnpm run check

      - name: Build FE
        run: |
          pnpm run prepare && pnpm run build

      - name: Audit repo
        run: |
          pnpm audit --audit-level=moderate || true

      - name: Summary
        run: echo "Frontend CI completed successfully"

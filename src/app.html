<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Chat App</title>

		<!-- ── PWA ─────────────────────────────────────────────────── -->
		<link rel="manifest" href="/manifest.json" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

		<!-- ── Theme colour (matches CSS --bg-primary per scheme) ── -->
		<meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)" />
		<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />

		<!-- ── Favicon ──────────────────────────────────────────────── -->
		<!-- Note: do NOT add a <link rel="preload"> for the favicon — browsers  -->
		<!-- don't match preloaded images to <link rel="icon">, which causes a  -->
		<!-- "preloaded but not used" console warning.                          -->
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />

		<!-- ── DNS prefetch + preconnect for external origins ──────── -->
		<!-- Cloudinary CDN (user avatars / logos referenced in CSP) -->
		<link rel="dns-prefetch" href="https://res.cloudinary.com" />
		<link rel="preconnect" href="https://res.cloudinary.com" crossorigin />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" data-sveltekit-preload-code="eager">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
